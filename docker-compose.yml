services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: traders_cockpit
      POSTGRES_USER: traders_cockpit
      POSTGRES_PASSWORD: change-me-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traders_cockpit -d traders_cockpit"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_ALLOW_ROLE_OVERRIDE: ${APP_ALLOW_ROLE_OVERRIDE:-true}
      OPS_REQUIRE_AUTH: ${OPS_REQUIRE_AUTH:-false}
      AUTH_REQUIRE_LOGIN: ${AUTH_REQUIRE_LOGIN:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_DB_PATH: ${AUTH_DB_PATH:-./data/auth.db}
      AUTH_SEED_USERS: ${AUTH_SEED_USERS:-true}
      AUTH_ADMIN_USERNAME: ${AUTH_ADMIN_USERNAME:-admin}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-change-me-admin}
      AUTH_TRADER_USERNAME: ${AUTH_TRADER_USERNAME:-trader}
      AUTH_TRADER_PASSWORD: ${AUTH_TRADER_PASSWORD:-change-me-trader}
      DATABASE_URL: postgresql://traders_cockpit:change-me-postgres@postgres:5432/traders_cockpit
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://127.0.0.1:${FRONTEND_HOST_PORT:-3000},http://localhost:${FRONTEND_HOST_PORT:-3000}
      REDIS_CHANNEL_PREFIX: ${REDIS_CHANNEL_PREFIX:-traders-cockpit}
      ALLOW_SQLITE_FALLBACK: ${ALLOW_SQLITE_FALLBACK:-false}
      SQLITE_FALLBACK_URL: ${SQLITE_FALLBACK_URL:-sqlite:///./data/traders_cockpit.db}
      BROKER_MODE: ${BROKER_MODE:-paper}
      ALLOW_LIVE_TRADING: ${ALLOW_LIVE_TRADING:-false}
      ALLOW_CONTROLLER_MOCK: ${ALLOW_CONTROLLER_MOCK:-true}
      LIVE_CONFIRMATION_TOKEN: ${LIVE_CONFIRMATION_TOKEN:-}
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:-}
      ALPACA_API_BASE_URL: ${ALPACA_API_BASE_URL:-https://paper-api.alpaca.markets}
      ALPACA_LIVE_API_BASE_URL: ${ALPACA_LIVE_API_BASE_URL:-https://api.alpaca.markets}
      ALPACA_DATA_BASE_URL: ${ALPACA_DATA_BASE_URL:-https://data.alpaca.markets}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      MASSIVE_API_BASE_URL: ${MASSIVE_API_BASE_URL:-https://api.polygon.io}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      POLYGON_API_BASE_URL: ${POLYGON_API_BASE_URL:-https://api.polygon.io}
      DEFAULT_ACCOUNT_EQUITY: ${DEFAULT_ACCOUNT_EQUITY:-100000}
      DEFAULT_RISK_PCT: ${DEFAULT_RISK_PCT:-1}
      MAX_POSITION_NOTIONAL_PCT: ${MAX_POSITION_NOTIONAL_PCT:-100}
      DAILY_LOSS_LIMIT_PCT: ${DAILY_LOSS_LIMIT_PCT:-2}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-6}
      OPS_API_KEY: ${OPS_API_KEY:-}
      OPS_ADMIN_API_KEY: ${OPS_ADMIN_API_KEY:-}
      OPS_SIGNING_SECRET: ${OPS_SIGNING_SECRET:-}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:${BACKEND_HOST_PORT:-8000}
        NEXT_PUBLIC_WS_URL: ws://127.0.0.1:${BACKEND_HOST_PORT:-8000}/ws/cockpit
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:${BACKEND_HOST_PORT:-8000}
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:${BACKEND_HOST_PORT:-8000}/ws/cockpit
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
