services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: traders_cockpit
      POSTGRES_USER: traders_cockpit
      POSTGRES_PASSWORD: traders_cockpit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    image: python:3.13-slim
    working_dir: /app/backend
    command: >
      sh -c "pip install -e .[dev] &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://traders_cockpit:traders_cockpit@postgres:5432/traders_cockpit
      REDIS_URL: redis://redis:6379/0
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:22
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:8000/ws/cockpit
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - backend

volumes:
  postgres_data:
