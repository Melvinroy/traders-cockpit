services:
  - type: web
    name: traders-cockpit-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    disk:
      name: auth
      mountPath: /var/lib/traders-cockpit/auth
    envVars:
      - key: APP_ENV
        value: staging
      - key: APP_ALLOW_ROLE_OVERRIDE
        value: "false"
      - key: OPS_REQUIRE_AUTH
        value: "true"
      - key: AUTH_REQUIRE_LOGIN
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_DB_PATH
        value: /var/lib/traders-cockpit/auth/auth.db
      - key: ALLOW_SQLITE_FALLBACK
        value: "false"
      - key: BROKER_MODE
        value: paper
      - key: ALLOW_LIVE_TRADING
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: traders-cockpit-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: traders-cockpit-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: LIVE_CONFIRMATION_TOKEN
        generateValue: true
      - key: AUTH_ADMIN_USERNAME
        sync: false
      - key: AUTH_ADMIN_PASSWORD
        sync: false
      - key: AUTH_TRADER_USERNAME
        sync: false
      - key: AUTH_TRADER_PASSWORD
        sync: false
  - type: redis
    name: traders-cockpit-redis
    plan: starter

databases:
  - name: traders-cockpit-postgres
    databaseName: traders_cockpit
    user: traders_cockpit
