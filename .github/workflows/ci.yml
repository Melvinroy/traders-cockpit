name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  config-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Config contract
        run: python scripts/dev/check-config-contract.py

  secret-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Secret hygiene
        run: python scripts/dev/check-secret-hygiene.py

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Pytest
        run: pytest -q

  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: traders_cockpit
          POSTGRES_USER: traders_cockpit
          POSTGRES_PASSWORD: change-me-postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U traders_cockpit -d traders_cockpit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://traders_cockpit:change-me-postgres@127.0.0.1:5432/traders_cockpit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Migration smoke
        run: python scripts/ci/run_migration_smoke.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm install
      - name: ESLint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Vitest
        run: npm run test
      - name: Build
        run: npm run build

  browser-qc:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install frontend
        working-directory: frontend
        run: npm install
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Browser QC
        run: python scripts/ci/run_browser_qc.py
      - name: Upload browser QC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-qc-artifacts
          path: |
            frontend/output/playwright/**
          if-no-files-found: error
